<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hero Module</title>
    <link rel="stylesheet" href="style.css" />
    
</head>
<body>
    <section id="hero" class="hero-module" aria-label="Hero section">
        <div class="hero-module__inner">
            <div class="hero-module__content">
                <p class="hero-module__eyebrow">Hero Module</p>
                <h1 class="hero-module__title">
                    Standalone hero section designed for reuse across any project.
                </h1>
                <p class="hero-module__text">
                    A compact, self-contained UI module with headline, supporting copy, calls to action, and a feature summary. Drop it into pages, templates, or component systems without extra layout work.
                </p>
                <div class="hero-module__actions">
                    <a class="hero-module__button hero-module__button--primary" href="#">Start now</a>
                    <a class="hero-module__button hero-module__button--secondary" href="#">Learn more</a>
                </div>
            </div>
                <div class="hero-image-side">
                    <img src="2.jpg" alt="Hero Image" class="hero-image">
                </div>
        </div>
    </section>
</body>
</html>
