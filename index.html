<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hero Module</title>
    <link rel="stylesheet" href="style.css" />
    
</head>
<body>
    <section id="hero" class="hero-module" aria-label="Hero section">
        <div class="hero-module__inner">
            <div class="hero-module__content">
                <p class="hero-module__eyebrow"> Real-world React practice</p>
                <h1 class="hero-module__title">
                    Master Frontend Development with Real React Projects
                </h1>
                <p class="hero-module__text">
                   Build responsive, modern interfaces with hands-on React challenges designed to improve your skills fast.
                </p>
                <div class="hero-module__actions">
                    <a class="hero-module__button hero-module__button--primary" href="#">Start Practicing</a>
                    <a class="hero-module__button hero-module__button--secondary" href="#">View Projects</a>
                </div>
            </div>
                <div class="hero-image-side">
                    <img src="2.jpg" alt="Hero Image" class="hero-image">
                </div>
        </div>
    </section>
</body>
</html>
